<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DCVTC66 — Chauffeur VTC à Perpignan</title>
  <meta name="description" content="DCVTC66, chauffeur VTC à Perpignan, propose des trajets fiables, confortables et ponctuels dans tout le département 66 et au-delà." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css?v=101" />
  <link rel="icon" type="image/png" href="LOGO DCVTC66.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2563eb">
  <link rel="apple-touch-icon" href="/icon-192.png">

  <style>
    html, body { margin: 0; padding: 0; overflow-x: hidden; }
    .container { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem; box-sizing: border-box; }
    .nav-inner ul { display: flex; gap: 1rem; list-style: none; padding-left: 0; margin: 0; }
    .nav-inner ul li a { text-decoration: none; }
    .hero-actions { display: flex; gap: 0.55rem; margin-top: 1.05rem; justify-content: center; flex-wrap: wrap; }
    .hero-actions a.btn-primary { display: inline-flex; align-items: center; justify-content: center; padding: 0.45rem 0.9rem; font-size: 0.8rem; border-radius: 999px; text-align: center; white-space: nowrap; }

    /* --- ADOUCISSEMENT DES CASES DU FORMULAIRE --- */
    .form-compact input, .form-compact textarea, .form-compact select { 
      padding: .75rem .85rem; 
      border-radius: 14px; 
      font-size: .92rem; 
      line-height: 1.4;
      background-color: rgba(255, 255, 255, 0.9) !important;
      border: 1px solid #ccc !important;
      color: #333 !important;
    }

    /* --- TARIF FLOTTANT --- */
    #tarif-flottant {
      position: fixed; top: 24px; right: 24px; z-index: 9999; display: none; align-items: center; gap: 0.75rem;
      padding: 0.9rem 1.3rem; border-radius: 999px; background: linear-gradient(135deg, #16a34a, #22c55e);
      color: #022c22; box-shadow: 0 16px 40px rgba(22, 163, 74, 0.7); font-size: 0.95rem; font-weight: 600; max-width: 90vw;
      border: 1px solid rgba(6, 95, 70, 0.75); animation: pulseTarif 1.6s ease-in-out infinite;
    }
    @keyframes pulseTarif {
      0% { transform: scale(1); }
      50% { transform: scale(1.06); }
      100% { transform: scale(1); }
    }

    .section-intro { margin-bottom: 0.75rem; }
    .form-compact { max-width: 560px; margin: 0 auto; }
    .form-compact .row { display: grid; grid-template-columns: 1fr 1fr; gap: .6rem; }
    .form-compact label { display: flex; flex-direction: column; gap: .25rem; font-size: .85rem; font-weight: 500; }
    
    .actions-compact{ display:grid; grid-template-columns: 1fr 1.15fr; gap:.6rem; margin-top:.75rem; }
    .actions-compact .btn-primary, .actions-compact .btn-estimate, .email-action{ border-radius:999px; padding:.9rem 1rem; font-weight:800; }
    .email-action{ margin-top: .6rem; width: 100%; display: inline-flex; justify-content: center; align-items: center; }

    /* --- DESIGN DU TARIF CENTRÉ ET DORÉ --- */
    .result-compact { 
      margin-top: 1rem; 
      padding: 1.5rem; 
      border-radius: 16px; 
      background: #1a1a1a; 
      color: #ffd700; 
      text-align: center; 
      border: 2px solid #ffd700; 
      font-weight: 700;
      box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    }
    .error-compact{ background:#ffecec; color:#a40000; padding:.65rem; border-radius:12px; margin-top:.6rem; }

    .map-wrapper { margin-top: .7rem; border-radius: 16px; overflow: hidden; }
    .map-wrapper-inner { position:relative; width:100%; height:320px; }
    #map { width:100%; height:100%; }

    @media (max-width: 768px) { .nav-inner ul { justify-content: center; } .logo { margin: 0 auto; display: block; } }
    @media (max-width: 520px){ .form-compact .row{ grid-template-columns: 1fr; } .actions-compact{ grid-template-columns: 1fr; } }
  </style>
</head>

<body>
  <header class="header">
    <div class="container header-inner">
      <div class="branding">
        <img src="LOGO DCVTC66.png" alt="Logo DCVTC66" class="logo" style="max-width:150px;">
        <h1 class="site-title">DCVTC66</h1>
        <p class="site-subtitle">Chauffeur VTC privé à Perpignan (66)</p>
        <div class="hero-actions">
          <a href="tel:0663463716" class="btn-primary">📞 Appeler</a>
          <a href="https://wa.me/33663463716" target="_blank" class="btn-primary">💬 WhatsApp</a>
        </div>
      </div>
    </div>
  </header>

  <section id="reservation" class="section section-alt">
    <div class="container">
      <form id="reservation-form" class="form-compact">
        <div class="row">
          <label>Nom <input type="text" name="Nom" placeholder="Votre nom" required></label>
          <label>Téléphone <input type="tel" name="Téléphone" placeholder="06…" required></label>
        </div>
        <label>Départ <input type="text" name="Départ" id="dep" placeholder="Adresse de départ" required></label>
        <label>Arrivée <input type="text" name="Arrivee" id="arr" placeholder="Adresse d'arrivée" required></label>
        <label>Date & heure <input type="datetime-local" name="DateHeure" required></label>
        
        <div class="row">
          <label>Passagers
            <select name="Passagers" required>
              <option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option>
            </select>
          </label>
          <label>Paiement
            <select name="Paiement" required>
              <option value="CB à bord">CB à bord</option>
              <option value="Espèces">Espèces</option>
              <option value="Lien CB">Lien sécurisé</option>
            </select>
          </label>
        </div>

        <div class="actions-compact">
          <button type="button" id="btn-tarif" class="btn-estimate">Estimer</button>
          <button type="submit" class="btn-primary">📩 Envoyer SMS</button>
        </div>
        <button type="button" id="btn-whatsapp-form" class="btn-primary email-action">💬 Envoyer WhatsApp</button>
        
        <div id="resultat-tarif" class="result-compact" style="display:none;"></div>
        <div id="erreur-tarif" class="error-compact" style="display:none;"></div>
        
        <div class="map-wrapper"><div class="map-wrapper-inner"><div id="map"></div></div></div>
      </form>
    </div>
  </section>

  <div id="tarif-flottant"><span id="tarif-flottant-texte">Estimation…</span></div>

  <script>
    document.getElementById("year") ? document.getElementById("year").textContent = new Date().getFullYear() : null;
    const form = document.getElementById('reservation-form');
    let derniereEstimation = null;

    function buildMessageText() {
      let msg = "Demande DCVTC66 :\n";
      msg += "Nom: " + form.Nom.value + "\n";
      msg += "De: " + form["Départ"].value + "\n";
      msg += "À: " + form["Arrivee"].value + "\n";
      if (derniereEstimation) msg += "Tarif estimé: " + derniereEstimation.tarif.toFixed(2) + "€";
      return msg;
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      window.location.href = "sms:+33663463716?&body=" + encodeURIComponent(buildMessageText());
    });

    document.getElementById("btn-whatsapp-form").addEventListener("click", () => {
      window.open("https://wa.me/33663463716?text=" + encodeURIComponent(buildMessageText()), "_blank");
    });

    // --- LOGIQUE TARIFS ---
    const BASE_KM = 7;
    const BASE_TARIF = 20;
    const SUPP_PAR_KM = 1.70;
    let map, distanceService, directionsService, directionsRenderer;

    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), { center: { lat: 42.6986, lng: 2.8956 }, zoom: 11 });
      distanceService = new google.maps.DistanceMatrixService();
      directionsService = new google.maps.DirectionsService();
      directionsRenderer = new google.maps.DirectionsRenderer({ map: map });

      new google.maps.places.Autocomplete(form["Départ"], { componentRestrictions: { country: 'fr' } });
      new google.maps.places.Autocomplete(form["Arrivee"], { componentRestrictions: { country: 'fr' } });
      document.getElementById("btn-tarif").addEventListener("click", calculerTarif);
    }

    function calculerTarif() {
      const dep = form["Départ"].value;
      const arr = form["Arrivee"].value;
      if (!dep || !arr) return alert("Complétez les adresses");

      distanceService.getDistanceMatrix({
        origins: [dep], destinations: [arr], travelMode: 'DRIVING'
      }, (response, status) => {
        if (status === "OK") {
          const el = response.rows[0].elements[0];
          if (el.status === "OK") {
            let dist = Math.round(el.distance.value / 1000);
            let prix = BASE_TARIF + (dist > BASE_KM ? (dist - BASE_KM) * SUPP_PAR_KM : 0);
            const h = form["DateHeure"].value ? new Date(form["DateHeure"].value).getHours() : 12;
            if (h >= 21 || h < 7) prix *= 1.2;

            derniereEstimation = { distanceKm: dist, tarif: prix };
            
            const resDiv = document.getElementById("resultat-tarif");
            resDiv.style.display = "block";
            resDiv.innerHTML = `
              <div style="font-size:0.9rem; opacity:0.8;">Estimation du trajet</div>
              <div style="font-size:2rem; margin:5px 0;">${prix.toFixed(2)} €</div>
              <div style="font-size:0.85rem;">Distance : ${dist} km</div>
            `;
            
            document.getElementById("tarif-flottant-texte").textContent = `Tarif : ${prix.toFixed(2)}€`;
            document.getElementById("tarif-flottant").style.display = "flex";

            directionsService.route({origin: dep, destination: arr, travelMode: 'DRIVING'}, (r, s) => {
              if (s === "OK") directionsRenderer.setDirections(r);
            });
          }
        }
      });
    }
  </script>
  <script src="https://maps.googleapis.com/maps/api/js?key=VOTRE_CLE_ICI&callback=initMap&libraries=places" async defer></script>
</body>
</html>
