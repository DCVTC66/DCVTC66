<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DCVTC66 — Chauffeur VTC à Perpignan</title>
  <meta name="description" content="DCVTC66, chauffeur VTC à Perpignan, propose des trajets fiables, confortables et ponctuels." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=102" />

  <style>
    html, body { margin: 0; padding: 0; overflow-x: hidden; }
    .container { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem; }

    /* --- FORMULAIRE ADOUCI --- */
    .form-compact input, .form-compact select { 
      padding: .75rem .85rem; 
      border-radius: 12px; 
      background-color: rgba(255, 255, 255, 0.9) !important;
      border: 1px solid #ccc !important;
      color: #333 !important;
      font-family: 'Poppins', sans-serif;
    }

    /* --- TARIF CENTRÉ ET DORÉ --- */
    .result-compact { 
      margin-top: 1.5rem; 
      padding: 1.5rem; 
      border-radius: 16px; 
      background: #1a1a1a; 
      color: #ffd700; 
      text-align: center; 
      border: 2px solid #ffd700; 
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }

    .actions-compact { display: grid; grid-template-columns: 1fr 1fr; gap: .6rem; margin-top: 1rem; }
    .btn-estimate, .btn-primary { border-radius: 999px; padding: .9rem; font-weight: 700; cursor: pointer; border: none; }
    .btn-estimate { background: #16a34a; color: white; }
    .email-action { width: 100%; margin-top: 0.6rem; background: #25d366; color: white; }

    #map { width: 100%; height: 300px; border-radius: 15px; margin-top: 1rem; }
    
    @media (max-width: 520px) { .actions-compact { grid-template-columns: 1fr; } }
  </style>
</head>

<body>
  <header class="header" style="text-align:center; padding: 2rem 0;">
    <img src="LOGO DCVTC66.png" alt="Logo" style="max-width:120px;">
    <h1 style="color:white; font-family:'Playfair Display';">DCVTC66</h1>
  </header>

  <section class="container">
    <form id="reservation-form" class="form-compact">
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:10px;">
        <input type="text" name="Nom" placeholder="Votre nom" required>
        <input type="tel" name="Téléphone" placeholder="Téléphone" required>
      </div>
      <input type="text" name="Départ" id="dep" placeholder="Adresse de départ" required style="width:100%; margin-bottom:10px;">
      <input type="text" name="Arrivee" id="arr" placeholder="Adresse d'arrivée" required style="width:100%; margin-bottom:10px;">
      <input type="datetime-local" name="DateHeure" required style="width:100%; margin-bottom:10px;">

      <div class="actions-compact">
        <button type="button" id="btn-tarif" class="btn-estimate">ESTIMER LE PRIX</button>
        <button type="submit" class="btn-primary">ENVOYER PAR SMS</button>
      </div>
      <button type="button" id="btn-whatsapp" class="btn-primary email-action">ENVOYER PAR WHATSAPP</button>

      <div id="resultat-tarif" class="result-compact" style="display:none;"></div>
      
      <div id="map"></div>
    </form>
  </section>

  <script>
    const form = document.getElementById('reservation-form');
    let derniereEstimation = null;

    // Tarifs de base
    const BASE_KM = 7;
    const BASE_TARIF = 20;
    const SUPP_PAR_KM = 1.70;

    function buildMessage() {
      let msg = `Réservation DCVTC66\nNom: ${form.Nom.value}\nDe: ${form.Départ.value}\nÀ: ${form.Arrivee.value}`;
      if(derniereEstimation) msg += `\nTarif estimé: ${derniereEstimation.tarif.toFixed(2)}€`;
      return msg;
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      window.location.href = "sms:+33663463716?body=" + encodeURIComponent(buildMessage());
    });

    document.getElementById("btn-whatsapp").addEventListener("click", () => {
      window.open("https://wa.me/33663463716?text=" + encodeURIComponent(buildMessage()), "_blank");
    });

    let map, distanceService, directionsRenderer, directionsService;

    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), { center: { lat: 42.6986, lng: 2.8956 }, zoom: 12 });
      distanceService = new google.maps.DistanceMatrixService();
      directionsService = new google.maps.DirectionsService();
      directionsRenderer = new google.maps.DirectionsRenderer({ map: map });

      new google.maps.places.Autocomplete(document.getElementById("dep"));
      new google.maps.places.Autocomplete(document.getElementById("arr"));

      document.getElementById("btn-tarif").addEventListener("click", () => {
        const d = document.getElementById("dep").value;
        const a = document.getElementById("arr").value;
        if(!d || !a) return alert("Veuillez saisir les adresses");

        distanceService.getDistanceMatrix({ origins: [d], destinations: [a], travelMode: 'DRIVING' }, (res, status) => {
          if (status === "OK") {
            const data = res.rows[0].elements[0];
            let dist = Math.round(data.distance.value / 1000);
            let prix = BASE_TARIF + (dist > BASE_KM ? (dist - BASE_KM) * SUPP_PAR_KM : 0);
            
            // Tarif nuit +20%
            const h = form.DateHeure.value ? new Date(form.DateHeure.value).getHours() : 12;
            if (h >= 21 || h < 7) prix *= 1.2;

            derniereEstimation = { tarif: prix };

            const resDiv = document.getElementById("resultat-tarif");
            resDiv.style.display = "block";
            resDiv.innerHTML = `
              <div style="font-size:1rem; opacity:0.8;">VOTRE TARIF ESTIMÉ</div>
              <div style="font-size:2.5rem; margin:10px 0; font-weight:bold;">${prix.toFixed(2)} €</div>
              <div style="font-size:0.9rem;">Distance: ${dist} km</div>
            `;

            directionsService.route({origin: d, destination: a, travelMode: 'DRIVING'}, (result, s) => {
              if (s === "OK") directionsRenderer.setDirections(result);
            });
          }
        });
      });
    }
  </script>
  <script src="https://maps.googleapis.com/maps/api/js?key=VOTRE_CLE_ICI&callback=initMap&libraries=places" async defer></script>
</body>
</html>
